name: Run comparisons (manual URLs, post to Jira)

on:
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run comparisons (manual URLs, post comments)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          # URLS_FROM_JIRA intentionally NOT set — the urls tab is used as
          # manually entered (old URL, new URL, issue key in columns A/B/C).
          # SKIP_JIRA intentionally NOT set — comments ARE posted to Jira.
          # FORCE_JIRA_COMMENT bypasses suppression: comment is posted even
          # if the issue already has a validation comment.
          FORCE_JIRA_COMMENT: "1"
        run: python sheets_runner.py